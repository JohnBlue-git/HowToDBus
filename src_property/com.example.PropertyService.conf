<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
    "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- This configuration file specifies the required security policies
       for the PropertyService to work. -->

  <!-- Only current user can own the PropertyService service -->
  <policy user="root">
    <allow own="com.example.PropertyService"/>
  </policy>

  <!-- Allow anyone to call into the service -->
  <policy context="default">
    <allow send_destination="com.example.PropertyService"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="com.example.PropertyService"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="com.example.PropertyService"
           send_interface="org.freedesktop.DBus.Peer"/>
  </policy>

</busconfig>
